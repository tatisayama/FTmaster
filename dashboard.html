<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | FTmaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=DM+Sans:opsz,wght@9..40,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body">

<div class="dash-layout">
  <!-- SIDEBAR -->
  <aside class="dash-sidebar">
    <div class="dash-logo">
      <img src="assets/logo.png" alt="Logo FTmaster">
      <span>FT<span>master</span></span>
    </div>
    <nav class="dash-nav">
      <a href="#" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> Visão Geral</a>
      <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Chamados (OS)</a>
      <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Dossiês & Laudos</a>
      <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Financeiro</a>
      <a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg> Relatórios SLA</a>
    </nav>
    <div class="dash-sidebar-footer">
      <a href="index.html" class="btn-ghost" style="width:100%; text-align:center; padding:0.6rem;">Sair do portal</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="dash-main">
    <!-- HEADER -->
    <header class="dash-header">
      <div class="dash-hierarchy">
        <label for="hierarchy-select">Visão Ativa:</label>
        <select id="hierarchy-select" onchange="updateDashboardView()">
          <option value="unidade">Nível 1 — Loja / Unidade (Ex: Carrefour Express Morumbi)</option>
          <option value="regional">Nível 2 — Regional (Ex: Regional SP Capital)</option>
          <option value="cliente">Nível 3 — Cliente Consolidado (Ex: Rede Carrefour Brasil)</option>
          <option value="admin">Nível 4 — Administração FTmaster (Gestão Global)</option>
        </select>
      </div>
      <div class="dash-user">
        <div class="user-info">
          <span class="user-name" id="user-name">João Silva</span>
          <span class="user-role" id="user-role">Gerente de Unidade</span>
        </div>
        <div class="user-avatar">JS</div>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <div class="dash-content">
      <div class="dash-title-bar">
        <h1 id="dash-title">Visão Geral — Unidade</h1>
        <button class="btn-fill" style="padding:0.6rem 1.2rem; font-size:0.8rem;">+ Nova OS</button>
      </div>

      <!-- KPIs -->
      <div class="dash-kpi-grid" id="kpi-grid">
        <!-- Injetado via JS -->
      </div>

      <!-- GRÁFICOS / TABELAS -->
      <div class="dash-charts">
        <div class="dash-card card-large">
          <div class="card-header">
            <h3>Andamento de Chamados (Últimos 7 dias)</h3>
            <button class="btn-ghost" style="padding:0.3rem 0.6rem; font-size:0.75rem;">Ver todos</button>
          </div>
          <div class="table-responsive">
            <table class="dash-table">
              <thead>
                <tr>
                  <th>OS</th>
                  <th>Local / Unidade</th>
                  <th>Serviço</th>
                  <th>Status SLA</th>
                  <th>Técnico</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="os-table-body">
                <!-- Injetado via JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="dashboard.js"></script>
</body>
</html>
